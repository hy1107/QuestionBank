<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}題庫密室{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">題庫密室</a>
    <ul>
      <li><a href="/parse">PDF 解析</a></li>
      <li><a href="/import">匯入題庫</a></li>
      <li><a href="/questions">題庫管理</a></li>
      <li><a href="/export">出題匯出</a></li>
      <li><a href="/quiz">線上練習</a></li>
    </ul>
  </nav>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
