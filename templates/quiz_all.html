{% extends "base.html" %}
{% block title %}全部作答 - 題庫密室{% endblock %}
{% block content %}
<h2>全部作答</h2>
<p>共 {{ questions|length }} 題，請完成所有題目後送出。</p>
<form method="post" action="{{ url_for('quiz_all_submit') }}" id="quiz-all-form">
  {% for q in questions %}
  <div class="card quiz-question" id="q-{{ q.id }}" style="margin-bottom:1rem">
    <p style="font-weight:bold;margin-bottom:.75rem">{{ loop.index }}. {{ q.question }}</p>
    <label style="display:block;margin-bottom:.4rem">
      <input type="radio" name="answer_{{ q.id }}" value="A"> (A) {{ q.option_a }}
    </label>
    <label style="display:block;margin-bottom:.4rem">
      <input type="radio" name="answer_{{ q.id }}" value="B"> (B) {{ q.option_b }}
    </label>
    <label style="display:block;margin-bottom:.4rem">
      <input type="radio" name="answer_{{ q.id }}" value="C"> (C) {{ q.option_c }}
    </label>
    <label style="display:block;margin-bottom:.4rem">
      <input type="radio" name="answer_{{ q.id }}" value="D"> (D) {{ q.option_d }}
    </label>
  </div>
  {% endfor %}
  <button type="submit" class="btn">送出作答</button>
</form>
<script src="{{ url_for('static', filename='quiz.js') }}"></script>
{% endblock %}
